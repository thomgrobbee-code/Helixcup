<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helix Cup WK Pool 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1a6b3c;
      --green-dark: #124d2b;
      --green-light: #eaf3de;
      --green-mid: #639922;
      --green-text: #3b6d11;
      --red: #e24b4a;
      --red-light: #fcebeb;
      --red-text: #a32d2d;
      --gray: #f5f5f3;
      --border: rgba(0,0,0,0.1);
      --text: #1a1a18;
      --muted: #6b6b67;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0d3d22;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow-x: hidden;
    }

    /* decoratieve achtergrond */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(26,107,60,0.6) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(26,107,60,0.4) 0%, transparent 60%);
      pointer-events: none;
    }

    .field-lines {
      position: fixed;
      inset: 0;
      opacity: 0.04;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 59px, white 59px, white 60px),
        repeating-linear-gradient(90deg, transparent, transparent 59px, white 59px, white 60px);
      pointer-events: none;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 460px;
      z-index: 1;
    }

    /* header */
    .header {
      text-align: center;
      margin-bottom: 2rem;
      animation: fadeDown 0.6s ease both;
    }

    .ball { font-size: 52px; display: block; margin-bottom: 0.5rem; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4)); }

    .logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      color: #fff;
      letter-spacing: 2px;
      line-height: 1;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .logo-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 6px;
    }

    /* kaart */
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: fadeUp 0.6s ease 0.15s both;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1.1rem; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="email"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background: var(--gray);
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
    }

    input:focus {
      border-color: var(--green);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(26,107,60,0.12);
    }

    input.error { border-color: var(--red); background: var(--red-light); }

    .err-msg { font-size: 12px; color: var(--red-text); margin-top: 5px; display: none; }
    .err-msg.show { display: block; }

    .submit-btn {
      width: 100%;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.18s, transform 0.12s;
      letter-spacing: 0.3px;
    }

    .submit-btn:hover { background: var(--green-dark); }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { background: #ccc; cursor: default; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: -3px;
      margin-right: 6px;
    }

    .already-msg {
      font-size: 13px;
      color: var(--red-text);
      background: var(--red-light);
      border-radius: 8px;
      padding: 10px 14px;
      margin-top: 0.75rem;
      display: none;
      text-align: center;
    }

    /* success */
    .success-card {
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      display: none;
      animation: fadeUp 0.5s ease both;
    }

    .success-icon { font-size: 56px; display: block; margin-bottom: 1rem; }

    .success-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      color: var(--green-text);
      letter-spacing: 1px;
    }

    .success-msg {
      font-size: 15px;
      color: var(--muted);
      margin-top: 10px;
      line-height: 1.7;
    }

    .success-msg strong { color: var(--text); }

    .success-badge {
      display: inline-block;
      background: var(--green-light);
      color: var(--green-text);
      border-radius: 99px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      margin-top: 1.25rem;
    }

    .footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      animation: fadeUp 0.6s ease 0.3s both;
    }

    @keyframes fadeDown { from { opacity:0; transform: translateY(-16px); } to { opacity:1; transform: none; } }
    @keyframes fadeUp   { from { opacity:0; transform: translateY(16px);  } to { opacity:1; transform: none; } }
    @keyframes spin     { to { transform: rotate(360deg); } }
  </style>
</head>

  <!-- Formulier -->
  <div class="card" id="form-card">
    <div class="card-title">Registreer je betaling</div>

    <div class="field">
      <label for="inp-name">Naam</label>
      <input type="text" id="inp-name" placeholder="Jouw volledige naam" maxlength="80" autocomplete="name" />
      <div class="err-msg" id="err-name">Vul je naam in</div>
    </div>

    <div class="field">
      <label for="inp-email">E-mailadres</label>
      <input type="email" id="inp-email" placeholder="naam@helix.nl" maxlength="120" autocomplete="email" />
      <div class="err-msg" id="err-email">Vul een geldig e-mailadres in</div>
    </div>

    <div class="field">
      <label for="inp-coach">Alias bondscoach</label>
      <input type="text" id="inp-coach" placeholder="Jouw alias als bondscoach" maxlength="80" />
      <div class="err-msg" id="err-coach">Vul je alias in</div>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">
      Ik heb betaald ✓
    </button>

    <div class="already-msg" id="already-msg">
      Dit e-mailadres is al geregistreerd. Ben je al klaar? 🎉
    </div>
  </div>

  <!-- Succes -->
  <div class="success-card" id="success-card">
    <span class="success-icon">🏆</span>
    <div class="success-title">Bedankt!</div>
    <div class="success-msg">
      Je betaling is geregistreerd, <strong id="suc-name"></strong>.<br>
      We hebben je aanmelding ontvangen op<br>
      <strong id="suc-email"></strong>.
    </div>
    <div class="success-badge">Veel succes met de Helix Cup! ⚽</div>
  </div>

  <div class="footer">Helix Cup WK Pool 2026 &mdash; Veel succes!</div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwlyaZ2OlUbBnNpesuLHcBA4_Bz-pobX827SVfJg2_FPuEfpUsrivUDqD60anjDXVU/exec";

  function isValidEmail(v) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  }

  async function handleSubmit() {
    const nameEl  = document.getElementById('inp-name');
    const emailEl = document.getElementById('inp-email');
    const coachEl = document.getElementById('inp-coach');
    const btn     = document.getElementById('submit-btn');
    const alreadyMsg = document.getElementById('already-msg');

    const errName  = document.getElementById('err-name');
    const errEmail = document.getElementById('err-email');
    const errCoach = document.getElementById('err-coach');

    const name  = nameEl.value.trim();
    const email = emailEl.value.trim();
    const coach = coachEl.value.trim();

    // reset
    [nameEl, emailEl, coachEl].forEach(el => el.classList.remove('error'));
    [errName, errEmail, errCoach].forEach(el => el.classList.remove('show'));
    alreadyMsg.style.display = 'none';

    let valid = true;
    if (!name)               { nameEl.classList.add('error');  errName.classList.add('show');  valid = false; }
    if (!isValidEmail(email)){ emailEl.classList.add('error'); errEmail.classList.add('show'); valid = false; }
    if (!coach)              { coachEl.classList.add('error'); errCoach.classList.add('show'); valid = false; }
    if (!valid) return;

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Bezig...';

    try {
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'register', name, email, coach })
      });
      const data = await res.json();

      if (data.success) {
        document.getElementById('suc-name').textContent  = name;
        document.getElementById('suc-email').textContent = email;
        document.getElementById('form-card').style.display    = 'none';
        document.getElementById('success-card').style.display = 'block';
      } else if (data.error === 'already_registered') {
        alreadyMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Ik heb betaald ✓';
      } else {
        alert('Er ging iets mis. Probeer het opnieuw.');
        btn.disabled = false;
        btn.textContent = 'Ik heb betaald ✓';
      }
    } catch(err) {
      alert('Kan de server niet bereiken. Controleer je internetverbinding.');
      btn.disabled = false;
      btn.textContent = 'Ik heb betaald ✓';
    }
  }

  ['inp-name','inp-email','inp-coach'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSubmit();
    });
  });

  // Logo is set via inline src attribute

</script>
</body>
</html>
